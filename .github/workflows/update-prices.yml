name: 🎮 Atualizar Preços

on:
  schedule:
    - cron: '0 */6 * * *'   # a cada 6 horas
  workflow_dispatch:
    inputs:
      force:
        description: 'Forçar commit mesmo sem mudanças?'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  update-prices:
    name: Atualizar prices.json
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Sem npm install — o script usa apenas fetch nativo do Node 18+
      - name: 🔍 Atualizar preços
        run: node scripts/update-prices.js

      - name: 💾 Commit prices.json (se mudou)
        run: |
          git config user.name  "RussoGames PriceBot"
          git config user.email "pricebot@russogames.com"

          if git diff --quiet public/prices.json; then
            echo "✅ Nenhuma mudança detectada."
            if [ "${{ inputs.force }}" = "true" ]; then
              git add public/prices.json
              git commit -m "chore(prices): atualização forçada [skip ci]" --allow-empty
              git push
            fi
          else
            git add public/prices.json
            git commit -m "chore(prices): $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
            git push
            echo "✅ prices.json atualizado e enviado!"
          fi

      # Descomente para notificações no Discord em caso de falha:
      # - name: 🔔 Notificar falha
      #   if: failure()
      #   run: |
      #     curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
      #       -H "Content-Type: application/json" \
      #       -d "{\"content\":\"⚠️ PriceBot falhou: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
